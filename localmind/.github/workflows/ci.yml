name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Go Core Engine
  build-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build
        run: go build -v ./...
      
      - name: Test
        run: go test -v ./...
      
      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: packages/core

  # TypeScript Extension
  build-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/extension
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/extension/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Compile
        run: npm run compile
      
      - name: Test
        run: npm test
        continue-on-error: true  # Tests not implemented yet

